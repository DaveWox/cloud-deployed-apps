stfc-cloud-argocd:
  argo-cd:
    configs:
      cm:
        # TODO remove this once PR merged
        oidc.skip.insecure.verify: false

    server:
      httproute:
        enabled: true
        hostnames:
          - argocd.david-epa.nubes.stfc.ac.uk
        parentRefs:
          - name: envoy-gateway-internal
            namespace: envoy-gateway-system
            sectionName: https
            group: gateway.networking.k8s.io
            kind: Gateway
    global:
      domain: argocd.david-epa.nubes.stfc.ac.uk

stfc-cloud-longhorn:
  longhorn:
    httproute:
      parentRefs:
        - name: envoy-gateway-internal
          namespace: envoy-gateway-system
          sectionName: https
          group: gateway.networking.k8s.io
          kind: Gateway
      hostnames:
        - longhorn.david-epa.nubes.stfc.ac.uk

    persistence:
      # can't be set for RWX
      migratable: false
